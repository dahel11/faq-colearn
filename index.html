<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoLearn – Pusat Bantuan</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue: #4169E1;
    --blue-dark: #2F50C1;
    --blue-light: #EEF2FF;
    --gray-bg: #F5F6FA;
    --gray-msg: #F0F0F0;
    --text: #1A1A2E;
    --text-muted: #6B7280;
    --white: #FFFFFF;
    --radius: 18px;
    --green: #22C55E;
    --green-dark: #16A34A;
    --wa: #25D366;
    --wa-dark: #1DB954;
  }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--gray-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  .phone-frame {
    width: 390px;
    height: 780px;
    background: var(--white);
    border-radius: 40px;
    box-shadow: 0 24px 80px rgba(65,105,225,0.18), 0 4px 16px rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  .chat-header {
    background: var(--blue);
    padding: 20px 20px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .avatar {
    width: 42px; height: 42px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .header-name { color: #fff; font-size: 15px; font-weight: 600; }
  .header-status { color: rgba(255,255,255,0.75); font-size: 12px; margin-top: 1px; }

  /* ── Messages ── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 0; }

  /* ── Bubbles ── */
  .bubble {
    max-width: 78%;
    font-size: 13.5px;
    line-height: 1.55;
    padding: 10px 14px;
    word-break: break-word;
    animation: popIn 0.2s ease;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.94) translateY(4px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .bot-row { display: flex; align-items: flex-end; gap: 8px; }
  .bot-avatar {
    width: 28px; height: 28px;
    background: var(--blue);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; flex-shrink: 0; margin-bottom: 2px;
  }
  .bubble-bot {
    background: var(--gray-msg);
    color: var(--text);
    border-radius: var(--radius) var(--radius) var(--radius) 4px;
  }
  .bubble-bot a { color: var(--blue); }
  .bubble-bot ol { padding-left: 18px; margin-top: 6px; }
  .bubble-bot ol li { margin-bottom: 3px; }

  .user-row { display: flex; justify-content: flex-end; }
  .bubble-user {
    background: var(--blue);
    color: #fff;
    border-radius: var(--radius) var(--radius) 4px var(--radius);
  }

  .ts { font-size: 10.5px; color: var(--text-muted); margin-top: 2px; }
  .ts-right { text-align: right; margin-right: 4px; }
  .ts-left  { margin-left: 36px; }

  .warning-box {
    background: #FFF8E1;
    border-left: 3px solid #F59E0B;
    padding: 7px 10px;
    border-radius: 6px;
    margin-bottom: 8px;
    font-size: 13px;
  }

  /* ── Chips ── */
  .chips-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 4px 0 4px 36px;
  }
  .chip {
    background: var(--blue-light);
    color: var(--blue-dark);
    border: 1.5px solid rgba(65,105,225,0.25);
    border-radius: 999px;
    padding: 7px 14px;
    font-size: 12.5px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    white-space: nowrap;
  }
  .chip:hover { background: var(--blue); color: #fff; border-color: var(--blue); }
  .chip:active { transform: scale(0.96); }
  .chip.used { pointer-events: none; opacity: 0.45; }

  /* ── Solved buttons ── */
  .solve-btns { display: flex; gap: 8px; padding: 4px 0 4px 36px; flex-wrap: wrap; }
  .btn-yes {
    background: var(--green); color: #fff;
    border: none; border-radius: 999px;
    padding: 8px 20px; font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: inherit;
    transition: background 0.15s;
  }
  .btn-yes:hover { background: var(--green-dark); }
  .btn-no {
    background: var(--white); color: var(--text);
    border: 1.5px solid #E5E7EB; border-radius: 999px;
    padding: 8px 20px; font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: inherit;
    transition: all 0.15s;
  }
  .btn-no:hover { border-color: var(--blue); color: var(--blue); }

  /* ── WA button ── */
  .btn-wa {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--wa); color: #fff;
    border: none; border-radius: 999px;
    padding: 9px 18px; font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: inherit;
    text-decoration: none; margin-top: 6px;
    transition: background 0.15s;
  }
  .btn-wa:hover { background: var(--wa-dark); }

  /* ── Typing indicator ── */
  .typing { display: flex; align-items: center; gap: 4px; padding: 12px 14px; }
  .dot { width: 7px; height: 7px; background: #B0B8C1; border-radius: 50%; animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); }
    40% { transform: translateY(-5px); }
  }

  /* ── Input area ── */
  .input-area {
    padding: 10px 14px 16px;
    background: var(--white);
    border-top: 1px solid #F0F0F0;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .input-hint {
    font-size: 12.5px;
    color: var(--text-muted);
    text-align: center;
  }

  .divider { text-align: center; font-size: 11px; color: var(--text-muted); margin: 4px 0; }

  /* ── Loading state ── */
  .loading-wrap {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    flex: 1; gap: 12px; color: var(--text-muted); font-size: 13px;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--blue-light);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="chat-header">
    <div class="avatar">🎓</div>
    <div>
      <div class="header-name">Kakak Siaga CoLearn</div>
      <div class="header-status">● Pusat Bantuan Otomatis</div>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="loading-wrap" id="loading">
      <div class="spinner"></div>
      <span>Memuat pertanyaan...</span>
    </div>
  </div>

  <div class="input-area">
    <span class="input-hint">👆 Pilih pertanyaan di atas untuk mulai</span>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// CONFIG — ganti sesuai kebutuhan
// ─────────────────────────────────────────────
const FAQ_JSON_URL = './faq.json';
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxj4gJhLCn1IQ97kkZgHd4Clf4AKffxVrsaa0DFzhLCrx8gcWMYTPWFQIuxAOr9CHA4VA/exec'; 
const WA_NUMBER = '6281119954075';
// ─────────────────────────────────────────────

const msgs  = document.getElementById('messages');
let faqData = [];

// Session tracking
const session = {
  id: Date.now().toString(36) + Math.random().toString(36).slice(2),
  startTime: Date.now(),
  category: '',
  question: '',
  outcome: 'no_response'
};

// ── Helpers ──────────────────────────────────
const now = () => {
  const d = new Date();
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
};

const wait = ms => new Promise(r => setTimeout(r, ms));

function disableChips(container) {
  container?.querySelectorAll('.chip').forEach(c => c.classList.add('used'));
}

function showTyping() {
  const el = document.createElement('div');
  el.className = 'bot-row'; el.id = 'typing-ind';
  el.innerHTML = `<div class="bot-avatar">🤖</div>
    <div class="bubble bubble-bot typing">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </div>`;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  document.getElementById('typing-ind')?.remove();
}

function addBotBubble(html) {
  const t = now();
  const row = document.createElement('div');
  row.className = 'bot-row';
  row.innerHTML = `
    <div class="bot-avatar">🤖</div>
    <div>
      <div class="bubble bubble-bot">${html}</div>
      <div class="ts ts-left">${t}</div>
    </div>`;
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function addUserBubble(text) {
  const t = now();
  const wrap = document.createElement('div');
  wrap.innerHTML = `
    <div class="user-row"><div class="bubble bubble-user">${text}</div></div>
    <div class="ts ts-right">${t}</div>`;
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

function addChips(items, onClick, parentEl = msgs) {
  const wrap = document.createElement('div');
  wrap.className = 'chips-wrap';
  items.sort((a,b) => a.order - b.order).forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.textContent = (item.emoji ? item.emoji + ' ' : '') + item.label;
    btn.onclick = () => {
      disableChips(wrap);
      onClick(item, wrap);
    };
    wrap.appendChild(btn);
  });
  parentEl.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
  return wrap;
}

// ── Format answer text (newlines + bold/links) ──
function formatAnswer(text) {
  return text
    .replace(/\n(\d+)\./g, '<br>$1.')
    .replace(/\n/g, '<br>');
}

// ── Log session to GAS ────────────────────────
async function logSession(outcome) {
  session.outcome = outcome;
  const payload = {
    session_id:      session.id,
    timestamp:       new Date().toISOString(),
    category:        session.category,
    question:        session.question,
    outcome:         outcome,
    processing_time: Math.round((Date.now() - session.startTime) / 1000)
  };
  if (GAS_URL === 'GANTI_DENGAN_URL_GAS_WEB_APP') return; // skip if not configured
  try {
    await fetch(GAS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
  } catch(e) { console.warn('Log failed:', e); }
}

// ── Solved / not solved flow ──────────────────
async function showSolvedQuestion() {
  await wait(500);
  showTyping(); await wait(700); removeTyping();

  const row = document.createElement('div');
  row.className = 'bot-row';
  row.innerHTML = `
    <div class="bot-avatar">🤖</div>
    <div>
      <div class="bubble bubble-bot">Apakah masalahnya sudah teratasi? 😊</div>
      <div class="ts ts-left">${now()}</div>
    </div>`;
  msgs.appendChild(row);

  const btns = document.createElement('div');
  btns.className = 'solve-btns';
  btns.innerHTML = `
    <button class="btn-yes">✅ Sudah teratasi</button>
    <button class="btn-no">❌ Belum teratasi</button>`;
  msgs.appendChild(btns);
  msgs.scrollTop = msgs.scrollHeight;

  btns.querySelector('.btn-yes').onclick = () => handleSolved(true, btns);
  btns.querySelector('.btn-no').onclick  = () => handleSolved(false, btns);
}

async function handleSolved(yes, btns) {
  btns.remove();
  if (yes) {
    addUserBubble('Sudah teratasi ✅');
    logSession('solved');
    await wait(400); showTyping(); await wait(700); removeTyping();
    addBotBubble('Senang bisa membantu! 🎉 Semangat belajarnya ya!<br><br>Kalau ada pertanyaan lain, pilih topik di bawah.');
    await wait(400);
    showMainMenu();
  } else {
    addUserBubble('Belum teratasi ❌');
    logSession('not_solved');
    await wait(400); showTyping(); await wait(700); removeTyping();
    const waMsg = encodeURIComponent('Halo Kakak Siaga, saya butuh bantuan lebih lanjut 🙏');
    addBotBubble(`Tenang, Kakak Siaga siap bantu lebih lanjut! 🙋<br><br>
      <a class="btn-wa" href="https://wa.me/${WA_NUMBER}?text=${waMsg}" target="_blank">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="white">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
        Chat dengan Kakak Siaga
      </a>`);
  }
}

// ── Navigation flows ──────────────────────────

async function handleAnswer(item) {
  session.question = item.label;
  await wait(400); showTyping(); await wait(800); removeTyping();

  const hasWarning = item.answer.startsWith('⚠️');
  let html = '';
  if (hasWarning) {
    const lines = item.answer.split('\n\n');
    const warnLine = lines[0].replace('⚠️ ', '');
    const rest = lines.slice(1).join('\n\n');
    html = `<div class="warning-box">⚠️ ${warnLine}</div>${formatAnswer(rest)}`;
  } else {
    html = `<b>${item.label}</b><br><br>${formatAnswer(item.answer)}`;
  }
  addBotBubble(html);
  showSolvedQuestion();
}

async function handleBranch(item) {
  session.question = item.label;
  addUserBubble((item.emoji ? item.emoji + ' ' : '') + item.label);
  await wait(400); showTyping(); await wait(700); removeTyping();
  addBotBubble(item.branch_question || 'Pilih salah satu:');
  await wait(300);
  addChips(item.children, async (child, wrap) => {
    disableChips(wrap);
    addUserBubble((child.emoji ? child.emoji + ' ' : '') + child.label);
    await handleAnswer(child);
  });
}

async function handleCategory(cat, chipsWrap) {
  session.category = cat.label;
  addUserBubble((cat.emoji ? cat.emoji + ' ' : '') + cat.label);
  await wait(400); showTyping(); await wait(600); removeTyping();
  addBotBubble(`Oke, soal <b>${cat.label}</b>! Pilih pertanyaanmu:`);
  await wait(300);
  addChips(cat.children, async (item, wrap) => {
    disableChips(wrap);
    if (item.type === 'branch') {
      await handleBranch(item);
    } else {
      addUserBubble((item.emoji ? item.emoji + ' ' : '') + item.label);
      await handleAnswer(item);
    }
  });
}

function showMainMenu() {
  addChips(faqData, async (cat, wrap) => {
    disableChips(wrap);
    await handleCategory(cat, wrap);
  });
}

// ── Init ──────────────────────────────────────
async function init() {
  try {
    const res = await fetch(FAQ_JSON_URL);
    faqData = await res.json();
  } catch(e) {
    document.getElementById('loading').innerHTML =
      '<span style="color:#EF4444">Gagal memuat data. Coba refresh halaman.</span>';
    return;
  }

  document.getElementById('loading').remove();
  msgs.innerHTML = '';

  const divider = document.createElement('div');
  divider.className = 'divider'; divider.textContent = 'Hari ini';
  msgs.appendChild(divider);

  showTyping(); await wait(800); removeTyping();
  addBotBubble('Halo! Selamat datang di Pusat Bantuan CoLearn 👋<br><br>Ada yang bisa Kakak bantu? Pilih topik di bawah ya!');
  await wait(400);
  showMainMenu();
}

init();
</script>
</body>
</html>
